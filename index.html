<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📝 Smart To-Do</h1>
        <button id="themeBtn">🌙</button>
    </div>

    <div class="input-box">

    <input type="text" id="taskInput" placeholder="Enter a task...">

    <select id="priority">
        <option value="High">🔴 High</option>
        <option value="Medium" selected>🟡 Medium</option>
        <option value="Low">🟢 Low</option>
    </select>
    <select id="category">
    <option value="Study">📚 Study</option>
    <option value="Work">💼 Work</option>
    <option value="Personal">🏠 Personal</option>
    <option value="Shopping">🛒 Shopping</option>
</select>

    <input type="date" id="dueDate">

    <button id="addBtn">Add</button>

    <button id="clearBtn">Clear All</button>

</div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search tasks..."
        >
        <div class="export-box">

    <button id="pdfBtn">📄 Export PDF</button>

    <button id="excelBtn">📊 Export Excel</button>

</div>
    </div>
    <div class="sort-box">
    <select id="sortTasks">
        <option value="default">Sort By</option>
        <option value="priority">Priority</option>
        <option value="date">Due Date</option>
        <option value="az">A - Z</option>
    </select>
</div>

    <div class="dashboard">

    <div class="card">
        <h3>Total</h3>
        <h2 id="totalTasks">0</h2>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <h2 id="pendingTasks">0</h2>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <h2 id="completedTasks">0</h2>
    </div>

    <div class="card">
        <h3>Overdue</h3>
        <h2 id="overdueTasks">0</h2>
    </div>

</div>

    <div class="progress-container">

        <div class="progress-header">
            <span>Progress</span>
            <span id="progressText">0%</span>
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

    </div>
    <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
</div>

<div class="charts">

    <div class="chart-card">
        <h3>📊 Task Status</h3>
        <canvas id="taskChart"></canvas>
    </div>

    <div class="chart-card">
        <h3>📈 Tasks by Category</h3>
        <canvas id="categoryChart"></canvas>
    </div>

</div>
<div class="ai-dashboard">

    <div class="ai-card">
        <h3>🏆 Productivity Score</h3>
        <h2 id="productivityScore">0%</h2>
        <p id="badge">🥉 Beginner</p>
    </div>

    <div class="ai-card">
        <h3>🤖 AI Suggestion</h3>
        <p id="aiSuggestion">Start adding tasks!</p>
    </div>

    <div class="ai-card">
        <h3>💡 Motivation</h3>
        <p id="quote"></p>
    </div>

</div> 
<div class="calendar-card">

    <h3>📅 Task Calendar</h3>

    <div id="calendar"></div>

</div>

<ul id="taskList"></ul>

    

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
</html>
